<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Halaman Tidak Ditemukan - TasbihKu</title>
    <link rel="stylesheet" href="style.css">
    <!-- Inline styles to ensure 404 looks good even if external CSS fails -->
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            min-height: 100vh;
        }
        .error-container {
            padding: 40px;
            max-width: 400px;
        }
        h1 {
            font-size: 5rem;
            color: var(--md-sys-color-primary);
            margin: 0;
            line-height: 1;
            font-weight: 800;
        }
        h2 {
            margin-top: 10px;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="error-container">
        <h1>404</h1>
        <h2 class="headline-large">Tersesat?</h2>
        <p class="text-sub" style="margin-bottom: 30px;">
            Halaman yang Anda cari tidak ditemukan. Mari kembali berdzikir.
        </p>
        <a href="index.html" class="btn btn-filled" style="display: inline-flex; text-decoration: none; max-width: 200px;">
            Kembali ke Tasbih
        </a>
    </div>
</body>
</html>
